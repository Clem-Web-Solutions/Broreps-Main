# /etc/nginx/sites-available/broreps.fr.conf
# BroReps multi-domain config

# ----------------------------------
# HTTP -> HTTPS redirection
# ----------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api-v2.broreps.fr supply.broreps.fr suivis.broreps.fr saas.broreps.fr shop.broreps.fr;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------
# API - Node.js (server)
# ----------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api-v2.broreps.fr;

    ssl_certificate /etc/letsencrypt/live/api-v2.broreps.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-v2.broreps.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}

# ----------------------------------
# SUPPLY - Vite static build
# ----------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name supply.broreps.fr;

    root /home/Broreps-Main/supply/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/supply.broreps.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/supply.broreps.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }
}

